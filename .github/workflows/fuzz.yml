name: Fuzz

# Daily fuzz run for the cargo-fuzz harnesses under fuzz/. Splits the
# 30-minute total budget across the 3 targets (~10 min each). The
# cross-decode harnesses dlopen libpng at runtime via libloading; the
# CI runner needs `libpng-dev` so they actually validate instead of
# silently skipping.

on:
  schedule:
    - cron: "23 5 * * *"   # daily 05:23 UTC, jittered off the hour
  workflow_dispatch:

jobs:
  fuzz:
    uses: OxideAV/.github/.github/workflows/crate-fuzz.yml@master
    with:
      extra_packages_apt: "libpng-dev"
      time_budget_seconds: 1800
    secrets: inherit
